<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - KINDORA</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        /* Full-page setup */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Background image with dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url("/static/child.jpg") center/cover no-repeat;
            filter: brightness(35%) contrast(105%);
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(5,20,30,0.58), rgba(0,0,0,0.52));
            z-index: -1;
        }

        /* Center card */
        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 42px 32px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            animation: fadeIn 0.8s ease-in-out;
            box-shadow: 0 20px 50px rgba(0,0,0,0.38);
            border: 1px solid rgba(255,255,255,0.15);
        }

        h2 {
            margin-bottom: 25px;
            font-size: 30px;
            font-weight: 600;
            letter-spacing: 0.4px;
            color: #ffffff;
            text-shadow: 0 4px 14px rgba(0,0,0,0.22);
        }

        /* Inputs */
        input[type="password"] {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            text-align: center;
            font-family: 'Poppins', Arial, sans-serif;
            background: rgba(255,255,255,0.92);
            color: #111;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        input[type="password"]::placeholder {
            color: #666;
        }

        input[type="password"]:focus {
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,198,255,0.25);
            transform: translateY(-1px);
        }

        /* Button */
        button {
            width: 100%;
            padding: 13px;
            margin-top: 15px;
            background: linear-gradient(135deg, #ffffff, #dff2ff);
            color: #111;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            font-family: 'Poppins', Arial, sans-serif;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 10px 24px rgba(0,0,0,0.22);
            letter-spacing: 0.3px;
        }

        button:hover {
            background: linear-gradient(135deg, #ffffff, #cfeeff);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 14px 28px rgba(0,0,0,0.28);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Error message */
        .error {
            color: #ff7b7b;
            margin-top: 10px;
            font-weight: 600;
            font-size: 14px;
            background: rgba(255, 0, 0, 0.10);
            border: 1px solid rgba(255, 120, 120, 0.22);
            padding: 10px 12px;
            border-radius: 12px;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(-12px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 34px 22px;
                border-radius: 20px;
            }

            h2 {
                font-size: 25px;
            }

            input[type="password"],
            button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>

    <form method="POST">
        <input type="password" name="new_password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        {% if message %}
            <div class="error">{{ message }}</div>
        {% endif %}

        <button type="submit">Reset Password</button>
    </form>
</div>

</body>
</html>
