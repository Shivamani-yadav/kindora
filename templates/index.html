<!DOCTYPE html>
<html>
<head>
    <title>KINDORA</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Image */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("/static/child.jpg") center center/cover no-repeat;
            filter: brightness(35%) contrast(105%);
            z-index: -1;
        }

        .container {
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 15px;
            animation: fallDown 1.2s ease forwards;
        }

        p {
            font-size: 20px;
            margin-bottom: 35px;
            opacity: 0;
            animation: fadeText 1s ease forwards;
            animation-delay: 0.5s;
        }

        .btn {
            padding: 12px 28px;
            margin: 10px;
            background-color: white;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background-color: #ddd;
            transform: scale(1.1);
        }

        @keyframes fallDown {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeText {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to KINDORA</h1>
        <p>"Bringing Hope Through Kindness"</p>

        <a href="/register" class="btn">Register</a>
        <a href="/login" class="btn">Login</a>
        <a href="/admin-login" class="btn">Admin</a> <!-- Added Admin button -->
    </div>

</body>
</html>
