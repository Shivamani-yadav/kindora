<!DOCTYPE html>
<html>
<head>
    <title>Account Settings - KINDORA</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: url("/static/child.jpg") center/cover no-repeat;
            color: white;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.72));
            z-index: 0;
            backdrop-filter: blur(4px);
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 35px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 430px;
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 12px 35px rgba(0,0,0,0.35);
            animation: fadeIn 0.8s ease;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        h3 {
            margin-bottom: 15px;
            font-size: 20px;
            color: #eaf6ff;
        }

        .section {
            margin-bottom: 28px;
            padding: 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        input {
            width: 100%;
            padding: 13px 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.92);
            color: #222;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: #87CEFA;
            box-shadow: 0 0 0 3px rgba(135, 206, 250, 0.25);
            transform: scale(1.01);
        }

        input::placeholder {
            color: #666;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 12px;
            background: linear-gradient(135deg, #6dd5fa, #2980b9);
            border: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 8px 18px rgba(41, 128, 185, 0.35);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(41, 128, 185, 0.45);
            background: linear-gradient(135deg, #7fe0ff, #2471a3);
        }

        button:active {
            transform: scale(0.98);
        }

        .message {
            font-weight: bold;
            margin-bottom: 18px;
            padding: 10px;
            border-radius: 12px;
        }

/* Success message */
        .success {
            color: #98ffb1;
            background: rgba(0,128,0,0.15);
            border: 1px solid rgba(152,255,177,0.4);
        }

/* Error message */
        .error {
            color: #ff8a8a;
            background: rgba(255,0,0,0.15);
            border: 1px solid rgba(255,100,100,0.4);
            }

        a {
            display: inline-block;
            margin-top: 8px;
            text-decoration: none;
            color: #9ad9ff;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s ease;
        }

        a:hover {
            color: #ffffff;
            transform: translateX(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .container {
                padding: 25px 18px;
                border-radius: 18px;
            }

            h2 {
                font-size: 24px;
            }

            h3 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <h2>Account Settings</h2>

    {% if message %}
        <p class="message {{ 'error' if 'incorrect' in message.lower() else 'success' }}">
    {{ message }}
</p>
    {% endif %}

    <!-- Change Name Section -->
    <div class="section">
        <h3>Change Name</h3>
        <form method="POST">
            <input type="hidden" name="action" value="change_name">
            <input type="text" name="new_name" placeholder="Enter New Name" required>
            <button type="submit">Update Name</button>
        </form>
    </div>

    <!-- Change Password Section -->
    <div class="section">
        <h3>Change Password</h3>
        <form method="POST">
            <input type="hidden" name="action" value="change_password">
            <input type="password" name="current_password" placeholder="Current Password" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit">Update Password</button>
        </form>
    </div>

    <br>
    <a href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
