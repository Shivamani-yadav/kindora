<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - KINDORA</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: url("/static/child.jpg") center/cover no-repeat;
            background-size: cover;
            position: relative;
            color: #fff;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .card {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 12px;
            border: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #ffffff;
            color: #000;
            font-weight: bold;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ddd;
            transform: scale(1.05);
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            font-weight: bold;
        }

        .index-btn {
            margin-top: 15px;
            display: inline-block;
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            text-decoration: none;
            color: #fff;
            background: #3498db;
            font-weight: bold;
            transition: 0.3s;
        }

        .index-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 400px) {
            .card { width: 90%; padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin Login</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <a href="/" class="index-btn">Back to Home</a>

        {% if message %}
            <div class="error">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
