<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adopt - KINDORA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: url("/static/child1.jpg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Dark Overlay */
body::before {
    content: "";
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    z-index: 0;
}

.main-container {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    max-width: 1000px;
    padding: 40px 20px;
    color: white;
}

.main-container h2 {
    font-size: 38px;
    font-weight: 700;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 16px;
    margin-bottom: 50px;
    opacity: 0.9;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 50px;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    width: 300px;
    padding: 55px 35px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    transition: 0.4s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-12px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.7);
    background: rgba(173,216,230,0.85);
    color: black;
}

.card-icon {
    font-size: 50px;
    margin-bottom: 25px;
}

.card-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 10px;
}

.card-desc {
    font-size: 14px;
}

a {
    text-decoration: none;
    color: inherit;
}

/* Home Button */
.home-btn {
    position: absolute;
    top: 25px;
    left: 30px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    padding: 10px 22px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    transition: 0.3s ease;
    z-index: 2;
}

.home-btn:hover {
    background: #ADD8E6;
    color: black;
    transform: translateY(-3px);
}

</style>
</head>

<body>

<a href="/dashboard" class="home-btn" target="_blank">🏠 Home</a>

<div class="main-container">
    <h2>Start a New Journey</h2>
    <p class="subtitle">Choose how you would like to make a meaningful connection</p>

   <div class="cards">

    <div class="card" onclick="window.open('/adopt-child', '_blank')">
        <div class="card-icon">👶</div>
        <div class="card-title">Adopt a Child</div>
        <div class="card-desc">
            Give a child a loving home and a brighter future.
        </div>
    </div>

    <div class="card" onclick="window.open('/matrimony', '_blank')">
        <div class="card-icon">💍</div>
        <div class="card-title">Matrimony</div>
        <div class="card-desc">
            Find a life partner and begin your forever story.
        </div>
    </div>

</div>
</div>

</body>
</html>
