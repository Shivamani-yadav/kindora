<!DOCTYPE html>
<html>
<head>
    <title>Register a Child - KINDORA</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: url("/static/child.jpg") center/cover no-repeat;
            color: white;
            text-align: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

       .container {
    position: relative;
    padding: 40px;
    border-radius: 20px;
    animation: fadeIn 1.5s ease-in-out;
    color: black;
    width: 350px;
    overflow: hidden;
}

.container::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: url("/static/kindoraimage.jpg");
    background-size: 1000px;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.7;   /* 👈 Adjust visibility here */
    z-index: -1;
}
        h2 {
            font-size: 32px;
            margin-bottom: 25px;
        }

        form input {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 15px;
            border: none;
            font-size: 16px;
        }

        form input[readonly] {
            background: #e0e0e0;
        }

        .btn {
            padding: 12px 28px;
            margin: 15px 0;
            background-color: #ADD8E6;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover { background-color: #87CEFA; }

        /* ✅ Added button row */
        .button-row {
            display: flex;
            gap: 10px;
        }

        .button-row .btn {
            width: 50%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #confirmationBox {
            display:none;
            position:fixed;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            background:#f9f9f9;
            color:black;
            padding:30px 25px;
            border-radius:20px;
            box-shadow:0 5px 25px rgba(0,0,0,0.3);
            text-align:center;
            z-index:1000;
            width: 380px;
        }

        #confirmationBox img.logo {
            width: 80px;
            margin-bottom: 15px;
        }

        #confirmationBox button {
            margin-top:20px;
            padding:10px 20px;
            background:#ADD8E6;
            border:none;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
        }

        #confirmationBox button:hover { background:#87CEFA; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <h2>register a child</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="user_name" placeholder="Your Name" value="{{ user_name }}" readonly>

            <!-- ✅ NEW ORDER: police station id, ph no, police station, child name, child found address -->
            <input type="text" name="police_station_id" placeholder="Police Station ID" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="text" name="police_station_name" placeholder="Police Station Name" required>
            <input type="text" name="child_name" placeholder="Child Name (optional)">
            <input type="text" name="child_found_address" placeholder="Child Found Address" required>

            <input type="file" name="child_photo" accept="image/*" required>

            <!-- ✅ Added Home Button beside Submit -->
            <div class="button-row">
                <button type="submit" class="btn">Submit</button>
                <button type="button" class="btn" onclick="goHome()">Home</button>
            </div>
        </form>
    </div>

    <div id="confirmationBox">
        <img src="/static/kindoraimage.jpg" class="logo" alt="KINDORA Logo">
        <p id="confirmationMessage"></p>
        <button onclick="closeDialog()">OK</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function goHome() {
            window.location.href = "/dashboard";
        }

        function closeDialog() {
            document.getElementById("confirmationBox").style.display = "none";
            document.querySelector("form").submit();
        }

        document.querySelector("form").addEventListener("submit", function(e) {
            e.preventDefault();

            const box = document.getElementById("confirmationBox");
            const message = document.getElementById("confirmationMessage");

            const childName = document.querySelector("input[name='child_name']").value || "N/A";
            const childAddress = document.querySelector("input[name='child_found_address']").value;

            message.innerHTML = `
                <p>Donation submitted! Child: ${childName}, Found at: ${childAddress}</p>
                <p>A confirmation email has been sent to your registered email.</p>
            `;

            box.style.display = "block";

            confetti({
                particleCount: 200,
                spread: 70,
                origin: { y: 0.6 }
            });

            function fireworks() {
                for(let i=0;i<5;i++){
                    confetti({
                        particleCount: 50,
                        spread: 100,
                        startVelocity: 60 + Math.random() * 60,
                        origin: { x: Math.random(), y: Math.random() * 0.6 }
                    });
                }
            }
            setTimeout(fireworks, 500);
        });
    </script>
</body>
</html>
