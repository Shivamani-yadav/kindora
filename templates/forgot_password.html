<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - KINDORA</title>

    <!-- Modern Font Added -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            box-sizing:border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Image */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url("/static/child.jpg") center center/cover no-repeat;
            filter: brightness(35%) contrast(105%);
            z-index: -2;
        }

        /* Soft gradient overlay */
        body::after{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(135deg,rgba(5,20,30,0.6),rgba(0,0,0,0.5));
            z-index:-1;
        }

        .container {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 45px 40px;
            border-radius: 25px;
            width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            animation: fadeUp 0.8s ease;
        }

        h2{
            font-size:28px;
            margin-bottom:20px;
            font-weight:600;
            letter-spacing:0.5px;
        }

        input {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 15px auto;
            border-radius: 14px;
            border: none;
            font-size:15px;
            transition:0.3s;
            background:rgba(255,255,255,0.9);
        }

        input:focus{
            outline:none;
            box-shadow:0 0 0 3px rgba(0,198,255,0.35);
            transform:translateY(-1px);
        }

        input::placeholder{
            color:#666;
        }

        .btn {
            padding: 13px 28px;
            background: linear-gradient(135deg,#00c6ff,#0072ff);
            color: white;
            border-radius: 30px;
            font-weight: 600;
            border:none;
            cursor: pointer;
            width:100%;
            transition:0.3s;
            letter-spacing:0.5px;
            margin-top:5px;
        }

        .btn:hover {
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(0,0,0,0.35);
        }

        .btn:active{
            transform:scale(0.97);
        }

        .error {
            color: #ff6b6b;
            font-weight:600;
            margin-top:5px;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(25px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Mobile Responsive */
        @media(max-width:450px){
            .container{
                width:90%;
                padding:35px 25px;
            }

            h2{
                font-size:24px;
            }
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Forgot Password</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Enter your registered email" required>

        {% if message %}
            <div class="error">{{ message }}</div>
        {% endif %}

        <button type="submit" class="btn">Send OTP</button>
    </form>
</div>

</body>
</html>
