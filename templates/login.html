<!DOCTYPE html>
<html>
<head>
    <title>Login - KINDORA</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("/static/child.jpg") center center/cover no-repeat;
            filter: brightness(35%) contrast(105%);
            z-index: -1;
        }

        .container {
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        h2 {
            font-size: 40px;
            margin-bottom: 30px;
        }

        form input {
            display: block;
            width: 280px;
            padding: 12px;
            margin: 15px auto;
            border-radius: 15px;
            border: none;
            font-size: 16px;
        }

        .btn {
            padding: 12px 28px;
            margin: 15px 5px;
            background-color: white;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #ddd;
            transform: scale(1.05);
        }

        .error {
            color: red;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        /* ✅ Added forgot password style */
        .forgot {
            display: block;
            margin-top: -10px;
            margin-bottom: 15px;
            color: #ADD8E6;
            font-size: 14px;
            text-decoration: none;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Login</h2>
        <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Enter Your Email" required>
            <input type="password" name="password" placeholder="Enter Your Password" required>

            <!-- ✅ Added Forgot Password Link -->
            <a href="/forgot-password" class="forgot">Forgot Password?</a>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <button type="submit" class="btn">Login</button>
        </form>

        <a href="/register" class="btn">Don't have an account? Register</a>
    </div>

</body>
</html>
